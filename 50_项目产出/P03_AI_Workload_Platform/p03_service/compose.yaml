services:
  db:
    image: postgres:17.5-alpine@sha256:6567bca8d7bc8c82c5922425a0baee57be8402df92bae5eacad5f01ae9544daa
    environment:
      POSTGRES_DB: p03
      POSTGRES_USER: p03
      POSTGRES_PASSWORD: p03
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p03 -d p03"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.0.3-alpine@sha256:25c0ae32c6c2301798579f5944af53729766a18eff5660bbef196fc2e6214a9c
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: p03-service:0.3.1
    environment: &app-environment
      P03_BACKEND: postgres
      DATABASE_URL: postgresql://p03:p03@db:5432/p03
      REDIS_URL: redis://redis:6379/0
      REDIS_QUEUE_KEY: p03:tasks:stream:v1
      OUTBOX_CLAIM_SECONDS: 15
      WORKER_LEASE_SECONDS: 8
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    restart: unless-stopped

  dispatcher:
    image: p03-service:0.3.1
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.dispatcher"]
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.dependency_check"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    image: p03-service:0.3.1
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker_service"]
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.dependency_check"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
