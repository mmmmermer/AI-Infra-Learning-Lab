apiVersion: v1
kind: Service
metadata:
  name: p03-api
  labels:
    app.kubernetes.io/name: p03-api
spec:
  selector:
    app.kubernetes.io/name: p03-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p03-api
  labels:
    app.kubernetes.io/name: p03-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: p03-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: p03-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: api
          image: p03-service:0.3.1
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: p03-runtime
            - secretRef:
                name: p03-secrets
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 3
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p03-dispatcher
  labels:
    app.kubernetes.io/name: p03-dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: p03-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: p03-dispatcher
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: dispatcher
          image: p03-service:0.3.1
          imagePullPolicy: Never
          command: ["python", "-m", "app.dispatcher"]
          envFrom:
            - configMapRef:
                name: p03-runtime
            - secretRef:
                name: p03-secrets
          readinessProbe:
            exec:
              command: ["python", "-m", "app.dependency_check"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p03-worker
  labels:
    app.kubernetes.io/name: p03-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: p03-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: p03-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: worker
          image: p03-service:0.3.1
          imagePullPolicy: Never
          command: ["python", "-m", "app.worker_service"]
          envFrom:
            - configMapRef:
                name: p03-runtime
            - secretRef:
                name: p03-secrets
          readinessProbe:
            exec:
              command: ["python", "-m", "app.dependency_check"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
