apiVersion: v1
kind: Service
metadata:
  name: p03-db
  labels:
    app.kubernetes.io/name: p03-db
spec:
  selector:
    app.kubernetes.io/name: p03-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p03-db
  labels:
    app.kubernetes.io/name: p03-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: p03-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: p03-db
    spec:
      containers:
        - name: postgres
          image: postgres:17.5-alpine@sha256:6567bca8d7bc8c82c5922425a0baee57be8402df92bae5eacad5f01ae9544daa
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: p03
            - name: POSTGRES_USER
              value: p03
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: p03-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "p03", "-d", "p03"]
            periodSeconds: 3
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d/001-init.sql
              subPath: init.sql
              readOnly: true
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: p03-db-init
